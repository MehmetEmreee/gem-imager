name: Build

on: workflow_dispatch

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 4
  QT_FORCE_STDERR_LOGGING: 1

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Upgrade OS
        run: |
          sudo apt-mark hold firefox grub-efi-amd64-signed
          sudo apt update && sudo apt upgrade
      - name: Install dependencies
        run: |
          sudo apt install --no-install-recommends build-essential cmake git libgnutls28-dev libxcb-cursor-dev libusb-1.0-0-dev pkg-config
          sudo wget -O ${{ runner.temp }}/appimagecraft.AppImage https://github.com/TheAssassin/appimagecraft/releases/download/continuous/appimagecraft-x86_64.AppImage
          sudo chmod +x ${{ runner.temp }}/appimagecraft.AppImage
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          aqtversion: '==3.1.*'
          version: '6.7.3'
          host: 'linux'
          target: 'desktop'
          arch: 'linux_gcc_64'
          modules: 'qtimageformats qtpdf qtserialport qtvirtualkeyboard qtquick3d'
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build
        id: build
        run: |
            export Qt6_ROOT="$Qt6_DIR"
            export QMAKE="$Qt6_DIR/bin/qmake"
            export LD_LIBRARY_PATH="$Qt6_DIR/lib"
            sed -i "s@Qt6_ROOT=.*@Qt6_ROOT=\"$Qt6_ROOT\"@" appimagecraft.yml
            sed -i "s@QMAKE: .*@QMAKE: \"$QMAKE\"@" appimagecraft.yml
            ${{ runner.temp }}/appimagecraft.AppImage
            imager_version=$(grep '  version:' appimagecraft.yml | cut -d ':' -f 2 | tr -d ' ')
            tee -a "${GITHUB_OUTPUT}" <<< gemImagerVersion="$imager_version"
            mv Gemstone_Imager-${imager_version}-x86_64.AppImage GemImager-${imager_version}.AppImage
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: GemImager Linux ${{ steps.build.outputs.gemImagerVersion }}
          path: GemImager-${{ steps.build.outputs.gemImagerVersion }}.AppImage

  linux-arm:
    runs-on: ubuntu-24.04-arm
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Upgrade OS
      run: |
        sudo apt-mark hold firefox
        sudo apt update && sudo apt upgrade -y

    - name: Install build dependencies
      run: |
        sudo apt install --no-install-recommends -y \
          build-essential cmake ninja-build git perl python3 pkg-config \
          libgnutls28-dev libxcb-cursor-dev libusb-1.0-0-dev \
          libfontconfig1-dev libfreetype6-dev libx11-dev libxext-dev \
          libxfixes-dev libxi-dev libxrender-dev libxcb1-dev \
          libxcb-glx0-dev libxcb-keysyms1-dev libxcb-image0-dev \
          libxcb-shm0-dev libxcb-icccm4-dev libxcb-sync-dev \
          libxcb-xfixes0-dev libxcb-shape0-dev libxcb-randr0-dev \
          libxcb-render-util0-dev libxkbcommon-dev libxkbcommon-x11-dev \
          libssl-dev libdbus-1-dev libgl1-mesa-dev libgles2-mesa-dev

    - name: Cache Qt 6.7.3
      id: cache-qt
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/Qt6
        key: qt-6.7.3-linux-arm64-v1

    - name: Build Qt 6.7.3 from source
      if: steps.cache-qt.outputs.cache-hit != 'true'
      run: |
        wget -q https://download.qt.io/official_releases/qt/6.7/6.7.3/single/qt-everywhere-src-6.7.3.tar.xz
        tar xf qt-everywhere-src-6.7.3.tar.xz
        mkdir qt-build && cd qt-build
        ../qt-everywhere-src-6.7.3/configure \
          -prefix ${{ github.workspace }}/Qt6 \
          -release \
          -opensource \
          -confirm-license \
          -nomake examples \
          -nomake tests \
          -skip qtwebengine \
          -skip qtlocation \
          -skip qtspeech \
          -skip qtmultimedia \
          -skip qtgraphs \
          -submodules qtbase,qtimageformats,qtpdf,qtserialport,qtvirtualkeyboard,qtquick3d,qtdeclarative,qttools,qtsvg
        cmake --build . --parallel $(nproc)
        cmake --install .

    - name: Build GemImager
      id: build
      run: |
        export Qt6_ROOT="${{ github.workspace }}/Qt6"
        export Qt6_DIR="${{ github.workspace }}/Qt6/lib/cmake/Qt6"
        export PATH="${{ github.workspace }}/Qt6/bin:$PATH"
        export LD_LIBRARY_PATH="${{ github.workspace }}/Qt6/lib"

        mkdir build
        cmake src/ -B build \
          -DCMAKE_PREFIX_PATH="${{ github.workspace }}/Qt6" \
          -DCMAKE_BUILD_TYPE=Release \
          -G Ninja
        cmake --build build --parallel

        version=$(grep IMAGER_VERSION_STR build/CMakeCache.txt | cut -d '=' -f 2)
        mv build/GemImager build/GemImager-${version}-ARM || true
        echo "gemImagerVersion=$version" >> $GITHUB_OUTPUT

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: GemImager Linux ARM ${{ steps.build.outputs.gemImagerVersion }}
        path: build/GemImager-${{ steps.build.outputs.gemImagerVersion }}-ARM
  windows:
    runs-on: windows-2022
    defaults: { run: { shell: cmd } }
    steps:
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          aqtversion: '==3.1.*'
          version: '6.7.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'
          modules: 'qtimageformats qtpdf qtserialport qtvirtualkeyboard qtquick3d'
          tools: 'tools_mingw90'
      - name: Install NSIS
        shell: powershell
        run: |
          iwr -useb get.scoop.sh -outfile 'install.ps1'
          .\install.ps1 -RunAsAdmin
          scoop update
          scoop bucket add extras
          scoop install nsis
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set MINGW64_ROOT
        shell: powershell
        run: |
          $mingw_dir = (Resolve-Path "$($env:Qt6_DIR)\..\..\Tools\mingw1120_64").Path -replace '\\', '/'
          (Get-Content "src\CMakeLists.txt") -replace 'set\(MINGW64_ROOT "C:/Qt/Tools/mingw1120_64"', "set(MINGW64_ROOT `"$mingw_dir`"" | Set-Content "src\CMakeLists.txt"
      - name: Patch for Windows (stpncpy fix)
        shell: bash
        run: |
          for file in src/dependencies/crypt/sha256crypt.c src/dependencies/crypt/sha512crypt.c; do
            sed -i '1i #ifdef _WIN32\n#include <string.h>\nstatic char *stpncpy(char *dst, const char *src, size_t n) {\n  size_t len = strnlen(src, n);\n  return strncpy(dst, src, n) + len;\n}\n#endif' $file
          done    
      - name: Configure
        id: build
        run: |
            set Path=%Qt6_DIR%\..\..\Tools\mingw1120_64\bin;%Path%
            cmake -S "%GITHUB_WORKSPACE%\src" -B "%GITHUB_WORKSPACE%\build" ^
              -DQT_QMAKE_EXECUTABLE:FILEPATH="%Qt6_DIR%\bin\qmake.exe" ^
              -DCMAKE_BUILD_TYPE:STRING=Release ^
              -DCMAKE_PREFIX_PATH:PATH="%Qt6_DIR%" ^
              -DCMAKE_GENERATOR:STRING=Ninja ^
              -G "Ninja"
      - name: Build
        run: |
          set Path=%Qt6_DIR%\..\..\Tools\mingw1120_64\bin;%Path%
          cmake --build "%GITHUB_WORKSPACE%\build" --parallel
      - name: Make NSIS installer
        run: |
          makensis %GITHUB_WORKSPACE%\build\gem-imager.nsi
      - name: Get project version
        id: getversion
        shell: bash
        run: |
          version=$(grep IMAGER_VERSION_STR "$GITHUB_WORKSPACE/build/CMakeCache.txt" | cut -d '=' -f 2)
          mv $GITHUB_WORKSPACE/build/gem-imager-${version}.exe $GITHUB_WORKSPACE/build/GemImager-${version}.exe
          tee -a "${GITHUB_OUTPUT}" <<< gemImagerVersion="$version"
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: GemImager Windows ${{ steps.getversion.outputs.gemImagerVersion }}
          path: ${{ github.workspace }}\build\GemImager-${{ steps.getversion.outputs.gemImagerVersion }}.exe

  macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install libusb pkg-config

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          aqtversion: '==3.1.*'
          version: '6.7.3'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          modules: 'qtimageformats qtpdf qtserialport qtvirtualkeyboard qtquick3d'

      - name: Configure and Build
        run: |
          LIBUSB_PATH=$(brew --prefix libusb)

          mkdir build
          cd build

          cmake ../src \
            -DCMAKE_PREFIX_PATH="$Qt6_DIR;$LIBUSB_PATH" \
            -DCMAKE_LIBRARY_PATH="$LIBUSB_PATH/lib" \
            -DCMAKE_INCLUDE_PATH="$LIBUSB_PATH/include/libusb-1.0" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_EXE_LINKER_FLAGS="-L$LIBUSB_PATH/lib" \
            -DCMAKE_SHARED_LINKER_FLAGS="-L$LIBUSB_PATH/lib"

          make -j$(sysctl -n hw.ncpu)

      - name: Deploy and Package macOS
        run: |
          ls -la build/
          APP_BUNDLE=$(find build -maxdepth 1 -name "*.app" | head -n 1)
          
          if [ -z "$APP_BUNDLE" ]; then
            echo "Hata: .app dosyasi bulunamadi!"
            exit 1
          fi
          
          echo "Bulunan uygulama: $APP_BUNDLE"
          
          $Qt6_DIR/bin/macdeployqt "$APP_BUNDLE"
          codesign --force --deep --sign - "$APP_BUNDLE"
          $Qt6_DIR/bin/macdeployqt "$APP_BUNDLE" -dmg
          
          DMG_FILE="${APP_BUNDLE%.app}.dmg"
          mv "$DMG_FILE" "build/GemImager-macOS-AppleSilicon.dmg"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GemImager-macOS-AppleSilicon
          path: build/GemImager-macOS-AppleSilicon.dmg
