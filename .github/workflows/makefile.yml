name: Build
on: workflow_dispatch
env:
  CMAKE_BUILD_PARALLEL_LEVEL: 4
  QT_FORCE_STDERR_LOGGING: 1

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Upgrade OS
        run: |
          sudo apt-mark hold firefox grub-efi-amd64-signed
          sudo apt update && sudo apt upgrade
      - name: Install dependencies
        run: |
          sudo apt install --no-install-recommends build-essential cmake git libgnutls28-dev libxcb-cursor-dev libusb-1.0-0-dev pkg-config
          sudo wget -O ${{ runner.temp }}/appimagecraft.AppImage https://github.com/TheAssassin/appimagecraft/releases/download/continuous/appimagecraft-x86_64.AppImage
          sudo chmod +x ${{ runner.temp }}/appimagecraft.AppImage
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          aqtversion: '==3.1.*'
          version: '6.7.3'
          host: 'linux'
          target: 'desktop'
          arch: 'linux_gcc_64'
          modules: 'qtimageformats qtpdf qtserialport qtvirtualkeyboard qtquick3d'
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build
        id: build
        run: |
            export Qt6_ROOT="$Qt6_DIR"
            export QMAKE="$Qt6_DIR/bin/qmake"
            export LD_LIBRARY_PATH="$Qt6_DIR/lib"
            sed -i "s@Qt6_ROOT=.*@Qt6_ROOT=\"$Qt6_ROOT\"@" appimagecraft.yml
            sed -i "s@QMAKE: .*@QMAKE: \"$QMAKE\"@" appimagecraft.yml
            ${{ runner.temp }}/appimagecraft.AppImage
            imager_version=$(grep '  version:' appimagecraft.yml | cut -d ':' -f 2 | tr -d ' ')
            tee -a "${GITHUB_OUTPUT}" <<< gemImagerVersion="$imager_version"
            mv Gemstone_Imager-${imager_version}-x86_64.AppImage GemImager-${imager_version}.AppImage
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: GemImager Linux ${{ steps.build.outputs.gemImagerVersion }}
          path: GemImager-${{ steps.build.outputs.gemImagerVersion }}.AppImage

  windows:
    runs-on: windows-2022
    defaults: { run: { shell: cmd } }
    steps:
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          aqtversion: '==3.1.*'
          version: '6.7.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'
          modules: 'qtimageformats qtpdf qtserialport qtvirtualkeyboard qtquick3d'
          tools: 'tools_mingw90'
      - name: Install NSIS
        shell: powershell
        run: |
          iwr -useb get.scoop.sh -outfile 'install.ps1'
          .\install.ps1 -RunAsAdmin
          scoop update
          scoop bucket add extras
          scoop install nsis
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set MINGW64_ROOT
        shell: powershell
        run: |
          $mingw_dir = (Resolve-Path "$($env:Qt6_DIR)\..\..\Tools\mingw1120_64").Path -replace '\\', '/'
          (Get-Content "src\CMakeLists.txt") -replace 'set\(MINGW64_ROOT "C:/Qt/Tools/mingw1120_64"', "set(MINGW64_ROOT `"$mingw_dir`"" | Set-Content "src\CMakeLists.txt"
      - name: Patch for Windows (stpncpy fix)
        shell: bash
        run: |
          # stpncpy fonksiyonu MinGW'de yok, bu yüzden onu manuel tanımlayan bir başlık ekliyoruz
          for file in src/dependencies/crypt/sha256crypt.c src/dependencies/crypt/sha512crypt.c; do
            sed -i '1i #ifdef _WIN32\n#include <string.h>\nstatic char *stpncpy(char *dst, const char *src, size_t n) {\n  size_t len = strnlen(src, n);\n  return strncpy(dst, src, n) + len;\n}\n#endif' $file
          done    
      - name: Configure
        id: build
        run: |
            set Path=%Qt6_DIR%\..\..\Tools\mingw1120_64\bin;%Path%
            cmake -S "%GITHUB_WORKSPACE%\src" -B "%GITHUB_WORKSPACE%\build" ^
              -DQT_QMAKE_EXECUTABLE:FILEPATH="%Qt6_DIR%\bin\qmake.exe" ^
              -DCMAKE_BUILD_TYPE:STRING=Release ^
              -DCMAKE_PREFIX_PATH:PATH="%Qt6_DIR%" ^
              -DCMAKE_GENERATOR:STRING=Ninja ^
              -G "Ninja"
      - name: Build
        run: |
          set Path=%Qt6_DIR%\..\..\Tools\mingw1120_64\bin;%Path%
          cmake --build "%GITHUB_WORKSPACE%\build" --parallel
      - name: Make NSIS installer
        run: |
          makensis %GITHUB_WORKSPACE%\build\gem-imager.nsi
      - name: Get project version
        id: getversion
        shell: bash
        run: |
          version=$(grep IMAGER_VERSION_STR "$GITHUB_WORKSPACE/build/CMakeCache.txt" | cut -d '=' -f 2)
          mv $GITHUB_WORKSPACE/build/gem-imager-${version}.exe $GITHUB_WORKSPACE/build/GemImager-${version}.exe
          tee -a "${GITHUB_OUTPUT}" <<< gemImagerVersion="$version"
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: GemImager Windows ${{ steps.getversion.outputs.gemImagerVersion }}
          path: ${{ github.workspace }}\build\GemImager-${{ steps.getversion.outputs.gemImagerVersion }}.exe
  macos:
    runs-on: macos-latest  # Apple Silicon (arm64) runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Install build tools
        run: brew install autoconf automake libtool pkg-config
 
      # ---------------------------------------------------------------------------
      # macos-latest = arm64 runner. Homebrew arm64-only kütüphaneler kurar.
      # Universal binary (arm64 + x86_64) için iki sorunlu bağımlılık var:
      #   1) libusb     → kaynak koddan universal static build yapıyoruz
      #   2) libnghttp2 → bundled curl'de HTTP/2'yi devre dışı bırakıyoruz
      #      (OS imager için HTTP/2 kritik değil; HTTPS SecureTransport ile çalışır)
      #
      # PKG_CONFIG_PATH'i SADECE bizim custom path'e set ediyoruz.
      # Homebrew path'ini append etmiyoruz — yoksa cmake yine
      # arm64-only system kütüphaneleri bulur ve x86_64 link hatası alırız.
      # ---------------------------------------------------------------------------
      - name: Build universal libusb (static)
        run: |
          git clone https://github.com/libusb/libusb.git /tmp/libusb-src
          cd /tmp/libusb-src
          ./autogen.sh
 
          for ARCH in x86_64 arm64; do
            make clean 2>/dev/null || true
            CFLAGS="-arch ${ARCH}" LDFLAGS="-arch ${ARCH}" \
            ./configure \
              --host=${ARCH}-apple-darwin \
              --prefix=/tmp/libusb-${ARCH} \
              --enable-static \
              --disable-shared
            make -j$(sysctl -n hw.ncpu)
            make install
          done
 
          mkdir -p /tmp/libusb-universal/lib/pkgconfig
          cp -r /tmp/libusb-arm64/include /tmp/libusb-universal/
 
          lipo -create \
            /tmp/libusb-x86_64/lib/libusb-1.0.a \
            /tmp/libusb-arm64/lib/libusb-1.0.a \
            -output /tmp/libusb-universal/lib/libusb-1.0.a
 
          # Doğrulama: "Architectures in the fat file: libusb-1.0.a are: x86_64 arm64"
          lipo -info /tmp/libusb-universal/lib/libusb-1.0.a
 
          # pkg-config dosyası: statik link için macOS framework'leri de dahil
          # (IOKit + CoreFoundation + AppKit libusb'in macOS backend'i için gerekli)
          {
            echo "prefix=/tmp/libusb-universal"
            echo "libdir=\${prefix}/lib"
            echo "includedir=\${prefix}/include/libusb-1.0"
            echo ""
            echo "Name: libusb-1.0"
            echo "Description: C API for USB device access"
            echo "Version: 1.0.27"
            echo "Libs: /tmp/libusb-universal/lib/libusb-1.0.a -lobjc -Wl,-framework,IOKit -Wl,-framework,CoreFoundation -Wl,-framework,AppKit"
            echo "Cflags: -I\${includedir}"
          } > /tmp/libusb-universal/lib/pkgconfig/libusb-1.0.pc
 
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          aqtversion: '==3.1.*'
          version: '6.7.3'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'  # Qt 6.2+ macOS: clang_64 universal binary (arm64+x86_64) içerir
          modules: 'qtimageformats qtpdf qtserialport qtvirtualkeyboard qtquick3d'
 
      - name: Configure and Build (Universal Binary)
        run: |
          # PKG_CONFIG_PATH'i SADECE bizim universal libusb path'ine set ediyoruz.
          # Homebrew path'leri ($PKG_CONFIG_PATH) eklenmez — arm64-only libs bulunmasın.
          export PKG_CONFIG_PATH=/tmp/libusb-universal/lib/pkgconfig
 
          mkdir build && cd build
 
          # -DUSE_NGHTTP2=OFF: bundled curl'de HTTP/2 devre dışı.
          # Homebrew libnghttp2 arm64-only olduğu için x86_64 linker hatası verir.
          # HTTPS bağlantıları SecureTransport (macOS native) ile sorunsuz çalışmaya devam eder.
          # CMakeLists.txt zaten CMAKE_OSX_ARCHITECTURES="arm64;x86_64" ve
          # CMAKE_OSX_DEPLOYMENT_TARGET="11" içeriyor, ayrıca geçmemize gerek yok.
          cmake ../src \
            -DCMAKE_PREFIX_PATH="$Qt6_DIR" \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_NGHTTP2=OFF
 
          make -j$(sysctl -n hw.ncpu)
 
          # Doğrulama: "Architectures in the fat file: gem-imager are: x86_64 arm64"
          lipo -info gem-imager.app/Contents/MacOS/gem-imager
 
      - name: Deploy and Package macOS
        run: |
          $Qt6_DIR/bin/macdeployqt build/gem-imager.app -dmg -verbose=1
          mv build/gem-imager.dmg build/GemImager-macOS-universal.dmg
 
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GemImager-macOS-universal
          path: build/GemImager-macOS-universal.dmg
 


